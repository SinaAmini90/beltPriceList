<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لیست قیمت تسمه خودرو</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- HEADER -->
      <div class="header">
        <div class="header-icon">
          <i class="fas fa-cart-shopping"></i>
        </div>
        <div>
          <h1>لیست قیمت تسمه خودرو</h1>
        </div>
      </div>

      <!-- FILTER SECTION با منوی کشویی -->
      <div class="filter-section">
        <div class="filter-group">
          <label for="carFilter"> <i class="fas fa-car"></i> خودرو </label>
          <select id="carFilter" class="filter-select">
            <option value="همه">همه خودروها</option>
            <option value="پژو ۲۰۶ تیپ ۲">پژو ۲۰۶ تیپ ۲</option>
            <option value="پژو ۲۰۶ تیپ ۵">پژو ۲۰۶ تیپ ۵</option>
            <option value="پژو ۲۰۶ تیپ ۲-۵">پژو ۲۰۶ تیپ ۲-۵</option>
            <option value="پژو ۲۰۶ فرمان برقی">پژو ۲۰۶ فرمان برقی</option>
            <option value="پژو ۲۰۶">پژو ۲۰۶</option>
            <option value="پژو ۴۰۷">پژو ۴۰۷</option>
            <option value="سمند">سمند</option>
            <option value="EF7">EF7</option>
            <option value="ال ۹۰">ال ۹۰</option>
            <option value="پراید">پراید</option>
            <option value="پراید یورو ۴">پراید یورو ۴</option>
            <option value="ریو">ریو</option>
            <option value="زانتیا">زانتیا</option>
            <option value="مزدا ۲۰۰۰">مزدا ۲۰۰۰</option>
            <option value="مزدا ۳۲۳">مزدا ۳۲۳</option>
            <option value="آردی">آردی</option>
            <option value="TU5">TU5</option>
            <option value="آریسان">آریسان</option>
            <option value="تارا">تارا</option>
            <option value="شاهین">شاهین</option>
            <option value="نیسان">نیسان</option>
            <option value="دلیکا">دلیکا</option>
            <option value="TU3">TU3</option>
            <option value="XU7">XU7</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="brandFilter">
            <i class="fas fa-certificate"></i> برند
          </label>
          <select id="brandFilter" class="filter-select">
            <option value="همه">همه برندها</option>
            <option value="رایکالتون">رایکالتون</option>
            <option value="کینگستون">کینگستون</option>
            <option value="دانگیل">دانگیل</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="nameFilter"> <i class="fas fa-box"></i> نام کالا </label>
          <select id="nameFilter" class="filter-select">
            <option value="همه">همه کالاها</option>
            <option value="تسمه">تسمه تایم</option>
            <option value="کیت">تسمه دینام</option>
            <option value="لنت">تسمه کولر</option>
            <option value="فیلتر">تسمه هیدرولیک</option>
            <option value="شمع">کیت تایم</option>
          </select>
        </div>
      </div>

      <!-- PRODUCT LIST -->
      <div class="product-list" id="productList">
        <!-- محصولات توسط JS رندر می‌شوند -->
      </div>
    </div>

    <!-- ===== دکمه ثابت تماس ===== -->
    <a href="tel:09134237637" class="float-btn" id="callBtn">
      <i class="fas fa-phone"></i>
      <span>تماس بگیرید</span>
    </a>

    <script src="js/script.js"></script>
  </body>
</html>
